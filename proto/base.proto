syntax = "proto3";

package netflux;

option go_package = "github.com/dellinger2023/net-flux/gen;gen";

enum MachineType {
    MT_UNIVERSAL    = 0;
    MT_GATEWAY      = 1;
    MT_MEDIASERVER  = 2;
    MT_OTHER        = 100;
}

// 一级命令
enum CMD {
    // 无意义，保留
    UNIVERSAL   = 0;

    // 系统相关指令
    SYSTEM      = 10;

    // 服务发现相关指令
    DISCOVERY   = 20;

    // 数据上报相关指令
    DATA_REPORT = 30;

    // 配置分发相关指令
    CONFIG      = 40;

    // 事件及报警相关指令
    EVENT       = 50;

    // 控制指令相关指令
    CONTROL     = 60;
}

// 二级指令 - 系统相关指令
enum SCMDSystem {
    // 无意义，保留
    SYS_UNIVERSAL   = 0;

    // 系统心跳指令 - 发送
    PING        = 10;

    // 系统心跳指令 - 接收
    PONG        = 11;
}

// 二级指令 - 服务发现相关指令
enum SCMDDisco {
    // 无意义，保留
    SD_UNIVERSAL    = 0;

    // 服务注册指令
    REGISTER     = 10;
    
    // 服务注销指令
    DEREGISTER   = 11;

    // 服务查询指令
    LOOKUP       = 12;

    // 服务查询响应指令
    LOOKUP_ACK   = 13;
}

// 二级指令 - 数据上报相关指令
enum SCMDDataReport {
    // 无意义，保留
    SR_UNIVERSAL   = 0;

    // 通用机器指标上报指令
    MACHINE_METRIC = 10;
    // 网络指标上报指令
    NETWORK_METRIC = 11;
    // 实例指标上报指令
    INSTANCE_METRIC = 12;
    // 会话指标上报指令
    SESSION_METRIC = 13;

    // 流上报指令
    STREAM_ADD = 20;
    // 删除流上报指令
    STREAM_DELETE = 21;
    // 流状态上报指令
    STREAM_STATUS = 22;
    // 流失败上报指令
    STREAM_FAILED = 23;
    // 流查询指令
    STREAMS_QUERY_REQ = 24;
    // 流查询响应指令
    STREAMS_QUERY_ACK = 25;

    // 会话上报指令
    SESSION_ADD = 30;
    // 删除会话上报指令
    SESSION_DELETE = 31;
    // 会话状态上报指令
    SESSION_STATUS = 32;
    // 会话失败上报指令
    SESSION_FAILED = 33;
    // 会话查询指令
    SESSION_QUERY_REQ = 40;
    // 会话查询响应指令
    SESSION_QUERY_ACK = 41;
}

enum SCMDConfig {
    // 无意义，保留
    CF_UNIVERSAL        = 0;
    // 白名单IP推送指令
    CF_WHITEIP_CHANGED  = 10;
    // 限流配置推送指令
    CF_LIMIT_CHANGED    = 20;
}

enum SCMDEvent {
    // 无意义，保留
    SE_UNIVERSAL     = 0;
    // 访问拒绝事件
    SE_ACCESS_DENIED = 10;
    // IP封禁事件
    SE_IP_BLOCKED    = 20;
}

// 流状态
enum StreamStatus {
    SS_UNIVERSAL    = 0;
    SS_RUNNING      = 1;
    SS_INACTIVE     = 2;
    SS_ERROR        = 3;
    SS_CLOSED       = 4;
    SS_TIMEOUT      = 5;
    SS_CANCELLED    = 6;
    SS_FAILED       = 7;
}

// 流编码格式
enum StreamCodec {
    SC_UNIVERSAL    = 0;
    SC_H264         = 1;
    SC_H265         = 2;
    SC_VP8          = 3;
    SC_VP9          = 4;
    SC_AV1          = 5;
    SC_MPEG4A       = 6;
    SC_MPEG4V       = 7;
    SC_MPEG1        = 8;
    SC_MPEG2        = 9;
    SC_MJPEG        = 10;
    SC_OPUS         = 11;
    SC_AAC          = 12;
    SC_SPEEX        = 13;
    SC_G722         = 14;
    SC_G711         = 15;
}

// 流封装协议
enum StreamProtocol {
    SP_UNIVERSAL    = 0;
    SP_RTMP         = 1;
    SP_RTSP         = 2;
    SP_HLS          = 3;
    SP_HTTP_FLV     = 4;
    SP_WS_FLV       = 5;
    SP_HTTPS_FLV    = 6;
    SP_WSS_FLV      = 7;
    SP_GB28181      = 8;
}
