syntax = "proto3";

package netflux;

import "base.proto";

option go_package = "github.com/dellinger2023/net-flux/gen;gen";

// 实例/容器状态报告
message MachineMetric {
    // 实例/容器ID；旧客户端可继续使用 machine_id 传递实例标识
    string machine_id = 1;
    // CPU 使用率
    double cpu_usage = 2;
    // CPU 分配核数
    int32 cpu_count = 3;
    // 内存占用
    int64 mem_used = 4;
    // 内存总数
    int64 mem_total = 5;
    // 磁盘占用
    int64 disk_used = 6;
    // 磁盘总数
    int64 disk_total = 7;
    // 磁盘读取字节数
    int64 disk_read_bytes = 8;
    // 磁盘写入字节数
    int64 disk_write_bytes = 9;
    // 磁盘读取时间
    int64 disk_read_time = 10;
    // 磁盘写入时间
    int64 disk_write_time = 11;
    // 磁盘读取次数
    int64 disk_read_count = 12;
    // 磁盘写入次数
    int64 disk_write_count = 13;
    // 采集时间
    int64 timestamp = 14;
    // 实例/容器额外信息
    map<string, string> extra = 15;
    // 实例ID；为空时服务端可回退使用 machine_id
    string instance_id = 16;
    // 实例名称
    string instance_name = 17;
    // 所属节点ID
    string node_id = 18;
    // 所属节点名称
    string node_name = 19;
    // 所属区域或机房名称
    string region = 20;
    // 节点状态
    string node_status = 21;
    // 实例状态
    string status = 22;
    // 网络入站吞吐量(bps)
    int32 network_in = 23;
    // 网络出站吞吐量(bps)
    int32 network_out = 24;
    // 实例启动时间
    int64 start_time = 27;
    // 实例版本号
    string version = 28;
}

// 网络状态报告
message NetworkMetric {
    // 机器ID
    string machine_id = 1;
    // 节点ID
    string node_id = 2;
    // 源IP
    string source_ip = 3;
    // 目的IP
    string destination_ip = 4;
    // 网络延迟(ms)
    int32 rtt = 5;
    // 网络抖动(ms)
    int32 jitter = 6;
    // 网络丢包率
    double packet_loss = 7;
    // 状态码
    int32 status_code = 8;
    // 采集时间
    int64 timestamp = 9;
    // 网络额外信息
    map<string, string> extra = 10;
}

// 流状态报告
message StreamMetric {
    // 实例/容器ID；旧客户端可继续使用 machine_id 传递实例标识
    string machine_id           = 1;
    // 服务器类型
    MachineType machine_type    = 2;
    // 流ID
    string stream_id            = 3;
    // 流状态
    StreamStatus status         = 4;
    // 视频编码格式
    StreamCodec video_codec     = 5;
    // 音频编码格式
    StreamCodec audio_codec     = 6;
    // 流协议
    StreamProtocol protocol     = 7;
    // 码率
    int32 bitrate               = 8;
    // 分辨率
    int32 width                 = 9;
    // 高度
    int32 height                = 10;
    // 流路径
    string stream_path          = 11;
    // 流别名访问
    string stream_alias         = 12;
    // 采集时间
    int64 timestamp             = 13;
    // 流额外信息
    map<string, string> extra   = 14;
    // 租户ID
    string tenant_id            = 15;
    // 节点名称
    string node_name            = 16;
    // 实例ID
    string instance_id          = 17;
    // 实例名称
    string instance_name        = 18;
    // 帧率
    double fps                  = 19;
    // 丢包率
    double packet_loss          = 20;
    // 流开始时间
    int64 start_time            = 21;
    // 流持续时间(秒)
    int32 duration              = 22;
    // 平均延迟(ms)
    int32 avg_delay             = 23;
    // 历史累计会话数量
    int64 total_sessions_lifetime = 24;
    // 当前活跃会话数量
    int32 current_active_sessions = 25;
    // 是否启用水印
    bool watermark_enabled      = 26;
    // 所属节点ID
    string node_id              = 27;
}

// 会话链路跳点
message LinkHop {
    // 跳点ID
    string hop_id = 1;
    // 跳点名称
    string hop_name = 2;
    // 跳点类型
    string hop_type = 3;
    // 节点ID
    string node_id = 4;
    // 节点名称
    string node_name = 5;
    // 跳点延迟(ms)
    int32 latency = 6;
}

// 会话状态报告
message SessionMetric {
    // 会话ID
    string session_id = 1;
    // 流ID
    string stream_id = 2;
    // 流名称
    string stream_name = 3;
    // 租户ID
    string tenant_id = 4;
    // 客户端ID
    string client_id = 5;
    // 客户端IP
    string client_ip = 6;
    // 客户端类型
    string client_type = 7;
    // 用户名称
    string user_name = 8;
    // 播放协议
    StreamProtocol protocol = 9;
    // 会话开始时间
    int64 start_time = 10;
    // 播放持续时间(秒)
    int32 play_duration = 11;
    // 当前帧率
    double current_fps = 12;
    // 当前码率(Kbps)
    int32 current_bitrate = 13;
    // 当前宽度
    int32 current_width = 14;
    // 当前高度
    int32 current_height = 15;
    // 实例/容器ID；旧客户端可继续使用 machine_id 传递实例标识
    string machine_id = 16;
    // 节点名称
    string node_name = 17;
    // 实例ID
    string instance_id = 18;
    // 实例名称
    string instance_name = 19;
    // 链路跳点
    repeated LinkHop link_hops = 20;
    // 链路总延迟(ms)
    int32 total_link_latency = 21;
    // 采集时间
    int64 timestamp = 22;
    // 会话额外信息
    map<string, string> extra = 23;
    // 所属节点ID
    string node_id = 24;
}
